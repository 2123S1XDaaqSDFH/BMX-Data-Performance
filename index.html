<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateLogic PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter;background:#050505;color:white;overflow:hidden}

/* ===== LOADER ===== */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#loader video{width:300px}

/* ===== AUTH ===== */
#auth{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
}
.auth-box{
background:#111;
padding:40px;
border-radius:20px;
width:350px;
}
input{
width:100%;
margin:8px 0;
padding:12px;
background:#000;
border:1px solid #222;
color:white;
}
button{
width:100%;
padding:12px;
margin-top:10px;
background:#00ff88;
border:none;
cursor:pointer;
}

/* ===== APP ===== */
#app{display:none;height:100vh}
aside{
width:220px;
background:#000;
padding:20px;
}
main{
flex:1;
padding:20px;
overflow-y:auto;
}
.container{display:flex;height:100%}

/* ===== PROFILE ===== */
.profile{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}
.profile img{
width:60px;
height:60px;
border-radius:50%;
}

/* ===== TABS ===== */
.tab{display:none}
.tab.active{display:block}

/* ===== FEED ===== */
.post{
background:#111;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

/* ===== RANKING ===== */
.rank{
background:#111;
padding:10px;
margin:5px 0;
}

/* ===== CHART ===== */
canvas{background:#111;padding:10px;border-radius:10px}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<video src="loader.mp4" autoplay muted></video>
</div>

<!-- AUTH -->
<div id="auth">
<div class="auth-box">

<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Entrar</button>

<hr>

<h2>Registro</h2>
<input id="name" placeholder="Nombre">
<input id="username" placeholder="Username">
<input id="peso" placeholder="Peso">
<input id="categoria" placeholder="Categoria">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Crear cuenta</button>

</div>
</div>

<!-- APP -->
<div id="app">
<div class="container">

<aside>
<h2>GL</h2>
<button onclick="showTab('feed')">Feed</button>
<button onclick="showTab('ranking')">Ranking</button>
<button onclick="showTab('compare')">Comparar</button>
<button onclick="logout()">Salir</button>
</aside>

<main>

<div class="profile">
<img id="avatar" src="https://via.placeholder.com/60">
<div>
<h3 id="userName">User</h3>
<input type="file" id="file">
<button onclick="uploadPhoto()">Subir foto</button>
</div>
</div>

<!-- FEED -->
<div id="feed" class="tab active">
<h2>Feed BMX</h2>
<input id="postText" placeholder="Escribe algo">
<button onclick="createPost()">Publicar</button>
<div id="feedList"></div>
</div>

<!-- RANKING -->
<div id="ranking" class="tab">
<h2>Ranking Mundial</h2>
<div id="rankingList"></div>
</div>

<!-- COMPARE -->
<div id="compare" class="tab">
<h2>Comparar Pilotos</h2>
<input id="user1" placeholder="UID 1">
<input id="user2" placeholder="UID 2">
<button onclick="compareUsers()">Comparar</button>
<canvas id="chart"></canvas>
</div>

</main>
</div>
</div>

<script type="module">

/* ===== FIREBASE ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    /* TU_CONFIG */
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

/* ===== LOADER ===== */
setTimeout(()=>{
loader.style.display="none";
},2500);

/* ===== AUTH ===== */
window.login = async ()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
};

window.register = async ()=>{
const cred = await createUserWithEmailAndPassword(auth,email.value,password.value);

await setDoc(doc(db,"users",cred.user.uid),{
name:name.value,
bestTime:999
});
};

/* ===== STATE ===== */
onAuthStateChanged(auth, async user=>{
if(user){
auth.style.display="none";
app.style.display="block";
loadUser(user.uid);
loadFeed();
loadRanking();
}
});

/* ===== PROFILE ===== */
async function loadUser(uid){
const snap = await getDoc(doc(db,"users",uid));
const d = snap.data();
userName.innerText = d.name;
if(d.photoURL) avatar.src = d.photoURL;
}

/* ===== FOTO ===== */
window.uploadPhoto = async ()=>{
const f = file.files[0];
const user = auth.currentUser;

const storageRef = ref(storage,"profiles/"+user.uid);
await uploadBytes(storageRef,f);

const url = await getDownloadURL(storageRef);

await setDoc(doc(db,"users",user.uid),{photoURL:url},{merge:true});
avatar.src = url;
};

/* ===== FEED ===== */
window.createPost = async ()=>{
await addDoc(collection(db,"posts"),{
text:postText.value,
uid:auth.currentUser.uid,
date:new Date()
});
loadFeed();
};

async function loadFeed(){
const snap = await getDocs(collection(db,"posts"));
feedList.innerHTML="";
snap.forEach(d=>{
feedList.innerHTML += `<div class="post">${d.data().text}</div>`;
});
}

/* ===== RANKING ===== */
async function loadRanking(){
const q = query(collection(db,"users"),orderBy("bestTime","asc"));
const snap = await getDocs(q);
rankingList.innerHTML="";
snap.forEach(d=>{
rankingList.innerHTML += `<div class="rank">${d.data().name} - ${d.data().bestTime}s</div>`;
});
}

/* ===== COMPARE ===== */
window.compareUsers = async ()=>{
const u1 = await getDoc(doc(db,"users",user1.value));
const u2 = await getDoc(doc(db,"users",user2.value));

new Chart(chart,{
type:'bar',
data:{
labels:['Tiempo'],
datasets:[
{label:u1.data().name,data:[u1.data().bestTime]},
{label:u2.data().name,data:[u2.data().bestTime]}
]
}
});
};

/* ===== NAV ===== */
window.showTab = (id)=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* ===== LOGOUT ===== */
window.logout = ()=>signOut(auth);

</script>

</body>
</html>
