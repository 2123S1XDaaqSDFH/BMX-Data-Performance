<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATELOGIC PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ========================= -->
<!-- AUTH -->
<!-- ========================= -->
<div id="login-screen" class="auth-viewport">

<div class="auth-split-layout">

<div class="auth-visual-side">
<div class="overlay-gradient"></div>
<div class="visual-content">
<h1>GATE<span>LOGIC</span></h1>
<p>Entrena. Compite. Domina.</p>
</div>
</div>

<div class="auth-form-side">

<div class="tabs">
<button onclick="switchTab('login')">Login</button>
<button onclick="switchTab('register')">Register</button>
</div>

<div id="login-box">
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()" class="btn-gl-primary">Entrar</button>
</div>

<div id="register-box" class="hidden">
<input id="name" placeholder="Nombre">
<input id="username" placeholder="Usuario">
<input id="peso" placeholder="Peso">
<input id="categoria" placeholder="Categoría">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()" class="btn-gl-primary">Crear cuenta</button>
</div>

</div>
</div>
</div>

<!-- ========================= -->
<!-- DASHBOARD -->
<!-- ========================= -->
<div id="dashboard" class="hidden app-shell">

<!-- SIDEBAR -->
<div class="app-sidebar">

<div class="nav-item" onclick="showSection('home')"><i class="fa fa-home"></i></div>
<div class="nav-item" onclick="showSection('ranking')"><i class="fa fa-trophy"></i></div>
<div class="nav-item" onclick="showSection('feed')"><i class="fa fa-fire"></i></div>
<div class="nav-item" onclick="showSection('duelos')"><i class="fa fa-bolt"></i></div>
<div class="nav-item" onclick="showSection('perfil')"><i class="fa fa-user"></i></div>
<div class="nav-item" onclick="logout()"><i class="fa fa-sign-out"></i></div>

</div>

<div class="app-content-viewport">

<h2>Hola <span id="user-name"></span></h2>

<!-- ========================= -->
<!-- HOME -->
<!-- ========================= -->
<div id="section-home" class="section">

<div class="kpi-row">
<div class="kpi-card"><div class="kpi-label">Best Time</div><div id="best-time">--</div></div>
<div class="kpi-card"><div class="kpi-label">Top Speed</div><div id="max-speed-display">--</div></div>
</div>

<form id="data-form">
<input id="gate-time" placeholder="Tiempo">
<input id="top-speed" placeholder="Velocidad">
<input type="range" id="feeling-range">
<button class="btn-submit-data">Guardar</button>
</form>

<canvas id="performanceChart"></canvas>

<table class="gl-table">
<tbody id="history-body"></tbody>
</table>

</div>

<!-- ========================= -->
<!-- RANKING -->
<!-- ========================= -->
<div id="section-ranking" class="section hidden">

<h3>Ranking Mundial</h3>

<select id="filter-country">
<option value="COL">Colombia</option>
<option value="USA">USA</option>
</select>

<select id="filter-category">
<option value="pro">Pro</option>
<option value="junior">Junior</option>
</select>

<button onclick="loadRankingFiltered()">Filtrar</button>

<div id="rankingList"></div>

</div>

<!-- ========================= -->
<!-- FEED -->
<!-- ========================= -->
<div id="section-feed" class="section hidden">

<h3>Feed BMX</h3>

<textarea id="postText" placeholder="Comparte tu entrenamiento..."></textarea>
<button onclick="createPost()">Publicar</button>

<div id="feedList"></div>

</div>

<!-- ========================= -->
<!-- DUELOS -->
<!-- ========================= -->
<div id="section-duelos" class="section hidden">

<h3>Duelos ⚔️</h3>

<input id="rivalEmail" placeholder="Email rival">
<button onclick="createDuel()">Retar</button>

<div id="duelList"></div>

</div>

<!-- ========================= -->
<!-- PERFIL -->
<!-- ========================= -->
<div id="section-perfil" class="section hidden">

<h3>Perfil</h3>

<img id="profile-pic" width="100">

<input type="file" id="uploadPhoto">

<input id="editName" placeholder="Nombre">
<input id="editPeso" placeholder="Peso">

<button onclick="updateProfileData()">Guardar perfil</button>

</div>

<!-- ========================= -->
<!-- COMPARADOR -->
<!-- ========================= -->
<div id="section-compare" class="section hidden">

<h3>Comparar Pilotos</h3>

<input id="pilot1" placeholder="Email piloto 1">
<input id="pilot2" placeholder="Email piloto 2">

<button onclick="comparePilots()">Comparar</button>

<div id="compareResult"></div>

</div>

</div>
</div>

<!-- ========================= -->
<!-- TOAST -->
<!-- ========================= -->
<div id="toast-container"></div>

<script type="module" src="app.js"></script>

<script>
function showSection(section){
document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
document.getElementById('section-'+section).classList.remove('hidden');
}
</script>

</body>
</html>
