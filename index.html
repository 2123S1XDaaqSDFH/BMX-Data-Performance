<!<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateLogic PRO</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ============================= */
/* GLOBAL */
/* ============================= */

:root {
    --primary: #00ff88;
    --bg: #050505;
    --card: #111;
    --border: #222;
    --text: #fff;
    --dim: #777;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
}

/* ============================= */
/* LOADER */
/* ============================= */

#loader {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    flex-direction: column;
}

.loader-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 3rem;
    color: white;
    letter-spacing: 3px;
}

.loader-bar {
    width: 200px;
    height: 3px;
    background: #222;
    margin-top: 20px;
    overflow: hidden;
}

.loader-fill {
    height: 100%;
    width: 0%;
    background: var(--primary);
}

/* ============================= */
/* VIEWS */
/* ============================= */

.view {
    display: none;
    height: 100vh;
}

.active {
    display: flex;
}

.hidden {
    display: none !important;
}

/* ============================= */
/* AUTH */
/* ============================= */

#auth-view {
    justify-content: center;
    align-items: center;
}

.auth-box {
    width: 400px;
    background: #111;
    padding: 40px;
    border-radius: 20px;
}

.auth-box h1 {
    text-align: center;
    margin-bottom: 20px;
}

.auth-box input, .auth-box select {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    background: #000;
    border: 1px solid #222;
    color: white;
}

.auth-box button {
    width: 100%;
    padding: 15px;
    background: var(--primary);
    border: none;
    font-weight: bold;
    cursor: pointer;
}

/* ============================= */
/* APP */
/* ============================= */

#app-view {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #000;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar button {
    margin-bottom: 10px;
    padding: 12px;
    background: none;
    border: none;
    color: var(--dim);
    text-align: left;
    cursor: pointer;
}

.sidebar button:hover {
    color: var(--primary);
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

/* ============================= */
/* PAGES */
/* ============================= */

.page {
    display: none;
}

.page.active {
    display: block;
}

/* ============================= */
/* CARDS */
/* ============================= */

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

/* ============================= */
/* PROFILE */
/* ============================= */

.profile-img {
    width: 100px;
    height: 100px;
    background: #222;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* ============================= */
/* TABLE */
/* ============================= */

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #222;
}

</style>
</head>

<body>

<!-- ============================= -->
<!-- LOADER -->
<!-- ============================= -->
<div id="loader">
    <video id="loaderVideo" autoplay muted playsinline>
        <source src="loader.mp4" type="video/mp4">
    </video>
</div>

<!-- ============================= -->
<!-- AUTH -->
<!-- ============================= -->
<div id="auth-view" class="view active">
    <div class="auth-box">
        <h1>Registro</h1>

        <input placeholder="Nombre">
        <input placeholder="Username">
        <input placeholder="Peso">
        <select>
            <option>Elite</option>
        </select>
        <input placeholder="Email">
        <input placeholder="Password">

        <button onclick="enterApp()">Entrar</button>
    </div>
</div>

<!-- ============================= -->
<!-- APP -->
<!-- ============================= -->
<div id="app-view" class="view">

    <div class="sidebar">
        <button onclick="go('dashboard')">Dashboard</button>
        <button onclick="go('profile')">Perfil</button>
        <button onclick="go('garage')">Garage</button>
        <button onclick="go('rivals')">Rivales</button>
        <button onclick="go('leaderboard')">Ranking</button>
    </div>

    <div class="main">

        <!-- DASHBOARD -->
        <div id="dashboard" class="page active">
            <h2>Dashboard</h2>
            <canvas id="chart"></canvas>
        </div>

        <!-- PROFILE -->
        <div id="profile" class="page">
            <h2>Perfil</h2>
            <div class="profile-img"></div>
            <input type="file">
        </div>

        <!-- GARAGE -->
        <div id="garage" class="page">
            <h2>Garage</h2>
            <button>Añadir Bike</button>
        </div>

        <!-- RIVALS -->
        <div id="rivals" class="page">
            <h2>Rivales</h2>
            <input placeholder="UID rival">
            <button>Agregar</button>
        </div>

        <!-- LEADERBOARD -->
        <div id="leaderboard" class="page">
            <h2>Ranking</h2>
            <table>
                <tr><th>Nombre</th><th>Tiempo</th></tr>
                <tr><td>Juan</td><td>1.12</td></tr>
            </table>
        </div>

    </div>

</div>

<script>

/* ============================= */
/* LOADER ANIMATION */
/* ============================= */

let progress = 0;
const fill = document.getElementById("loaderFill");

const interval = setInterval(() => {
    progress += 5;
    fill.style.width = progress + "%";

    if(progress >= 100){
        clearInterval(interval);
        document.getElementById("loader").style.display = "none";
    }
}, 50);

/* ============================= */
/* NAVIGATION */
/* ============================= */

function go(page){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

/* ============================= */
/* ENTER APP */
/* ============================= */

function enterApp(){
    document.getElementById("auth-view").classList.remove("active");
    document.getElementById("app-view").classList.add("active");
}

/* ============================= */
/* CHART */
/* ============================= */

const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['1','2','3','4'],
        datasets: [{
            data: [1.2,1.1,1.15,1.12],
            borderColor: '#00ff88'
        }]
    }
});

</script>

</body>
</html>
