<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GateLogic PRO</title>

<!-- ========================= -->
<!-- FONTS -->
<!-- ========================= -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ========================= */
/* ROOT */
/* ========================= */
:root{
    --primary:#00ff88;
    --bg:#050505;
    --card:rgba(20,20,20,0.9);
    --border:#222;
    --text:#fff;
    --dim:#888;
}

/* ========================= */
/* BODY */
/* ========================= */
body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* ========================= */
/* LOADER */
/* ========================= */
#loader{
    position:fixed;
    inset:0;
    background:black;
    z-index:9999;
}

#loader video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.fade-out{
    opacity:0;
    transition:opacity 0.8s ease;
}

/* ========================= */
/* BACKGROUND EFFECT */
/* ========================= */
.bg-glow{
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,var(--primary),transparent);
    filter:blur(120px);
    top:-200px;
    left:-200px;
    opacity:0.2;
}

/* ========================= */
/* AUTH WRAPPER */
/* ========================= */
#auth{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:opacity 1s ease;
}

#auth.active{
    opacity:1;
}

/* ========================= */
/* CARD */
/* ========================= */
.auth-box{
    width:420px;
    background:var(--card);
    backdrop-filter:blur(25px);
    border:1px solid var(--border);
    padding:40px;
    border-radius:25px;
    position:relative;
}

/* ========================= */
/* LOGO */
/* ========================= */
.logo{
    font-family:'Rajdhani',sans-serif;
    font-size:2.8rem;
    text-align:center;
    margin-bottom:30px;
}

.logo span{
    color:var(--primary);
}

/* ========================= */
/* INPUTS */
/* ========================= */
.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-size:0.7rem;
    color:var(--dim);
    margin-bottom:5px;
    display:block;
}

.input-group input,
.input-group select{
    width:100%;
    padding:14px;
    background:#000;
    border:1px solid #222;
    color:white;
    border-radius:10px;
}

/* ========================= */
/* BUTTON */
/* ========================= */
button{
    width:100%;
    padding:15px;
    border:none;
    background:var(--primary);
    color:black;
    font-weight:800;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

/* ========================= */
/* SWITCH */
/* ========================= */
.switch{
    text-align:center;
    margin-top:15px;
    font-size:0.8rem;
    color:var(--dim);
    cursor:pointer;
}

/* ========================= */
/* HIDDEN */
/* ========================= */
.hidden{
    display:none;
}

/* ========================= */
/* ANIM */
/* ========================= */
.slide-up{
    transform:translateY(40px);
    opacity:0;
    transition:all 0.6s ease;
}

.slide-up.active{
    transform:translateY(0);
    opacity:1;
}

/* ========================= */
/* ERROR */
/* ========================= */
.error{
    color:#ff4444;
    font-size:0.7rem;
    margin-top:5px;
}

/* ========================= */
/* SUCCESS */
/* ========================= */
.success{
    color:#00ff88;
    font-size:0.7rem;
}

/* ========================= */
/* EXTRA UI */
/* ========================= */
.footer{
    margin-top:20px;
    text-align:center;
    font-size:0.6rem;
    color:#444;
}

</style>
</head>

<body>

<!-- ========================= -->
<!-- LOADER -->
<!-- ========================= -->
<div id="loader">
    <video id="loaderVideo" muted playsinline>
        <source src="loader.mp4" type="video/mp4">
    </video>
</div>

<!-- ========================= -->
<!-- AUTH -->
<!-- ========================= -->
<div id="auth">

<div class="bg-glow"></div>

<div class="auth-box slide-up" id="authBox">

<div class="logo">G-<span>LOGIC</span></div>

<!-- LOGIN -->
<div id="loginForm">

<div class="input-group">
<label>Email</label>
<input id="loginEmail">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="loginPass">
</div>

<button onclick="login()">INICIAR SESIÓN</button>

<div class="switch" onclick="showRegister()">Crear cuenta</div>

</div>

<!-- REGISTER -->
<div id="registerForm" class="hidden">

<div class="input-group">
<label>Nombre</label>
<input id="name">
</div>

<div class="input-group">
<label>Username</label>
<input id="username">
</div>

<div class="input-group">
<label>Peso</label>
<input id="peso">
</div>

<div class="input-group">
<label>Categoría</label>
<select id="categoria">
<option>Junior</option>
<option>Elite</option>
</select>
</div>

<div class="input-group">
<label>Email</label>
<input id="email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password">
</div>

<button onclick="register()">REGISTRAR</button>

<div class="switch" onclick="showLogin()">Ya tengo cuenta</div>

</div>

<div id="msg"></div>

<div class="footer">GateLogic v3.0</div>

</div>

</div>

<script>

/* ========================= */
/* LOADER */
/* ========================= */
const video=document.getElementById("loaderVideo");
const loader=document.getElementById("loader");
const auth=document.getElementById("auth");
const box=document.getElementById("authBox");

video.oncanplaythrough=()=>video.play();

video.onended=()=>{
    loader.classList.add("fade-out");

    setTimeout(()=>{
        loader.style.display="none";
        auth.classList.add("active");

        setTimeout(()=>{
            box.classList.add("active");
        },100);

    },800);
};

/* ========================= */
/* SWITCH */
/* ========================= */
function showRegister(){
    loginForm.classList.add("hidden");
    registerForm.classList.remove("hidden");
}

function showLogin(){
    registerForm.classList.add("hidden");
    loginForm.classList.remove("hidden");
}

/* ========================= */
/* VALIDATION */
/* ========================= */
function showMsg(text,type){
    const msg=document.getElementById("msg");
    msg.className=type;
    msg.innerText=text;
}

/* ========================= */
/* LOGIN */
/* ========================= */
function login(){
    const email=document.getElementById("loginEmail").value;
    const pass=document.getElementById("loginPass").value;

    if(!email || !pass){
        showMsg("Completa los campos","error");
        return;
    }

    showMsg("Acceso correcto (simulado)","success");
}

/* ========================= */
/* REGISTER */
/* ========================= */
function register(){
    const name=document.getElementById("name").value;
    const email=document.getElementById("email").value;

    if(!name || !email){
        showMsg("Faltan datos","error");
        return;
    }

    showMsg("Registro exitoso (simulado)","success");
}

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  updateProfile,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
</script>

</body>
</html>
